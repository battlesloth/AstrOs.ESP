name: PR Validation

on:
  pull_request:
    branches:
      - main
      - develop
      - 'release/rel_*'
  workflow_dispatch:

# Cancel in-flight runs when a new commit is pushed to the same PR.
# (Phase 3 release/RC workflows will use cancel-in-progress: false to serialize on tag counts.)
concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  native-purity:
    name: Native-purity guard for PURE libs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for forbidden ESP-IDF / FreeRTOS / driver includes
        run: |
          set -euo pipefail
          # PURE libs are unit-tested on the native host under [env:test], so
          # they must not pull in any ESP-IDF, FreeRTOS, or low-level driver
          # headers. To add a new PURE lib: append its path here AND state the
          # purity rule in the lib's README. Catch violations as early as
          # possible — broken purity shows up at `pio test -e test` time
          # otherwise, which is a much noisier failure mode.
          PURE_LIBS=(
            lib_native/AstrOsMessaging
            lib_native/AstrOsUtility
            lib_native/AstrOsLogging
            lib_native/AstrOsSerialProtocol
            lib_native/AstrOsAnimationCommands
            lib_native/AstrOsAnimationEngine
            lib_native/AstrOsEspNowProtocol
            lib_native/AstrOsEspNowPeers
          )
          PATTERN='#include[[:space:]]*[<"](freertos/|esp_|driver/|nvs_|sdmmc_)'
          status=0
          for path in "${PURE_LIBS[@]}"; do
            if [ ! -d "$path" ]; then
              echo "::error::PURE lib path not found: $path"
              status=1
              continue
            fi
            if grep -rEn "$PATTERN" "$path"; then
              echo "::error::$path contains forbidden ESP-IDF/FreeRTOS/driver includes (see lines above)."
              status=1
            fi
          done
          if [ "$status" -ne 0 ]; then
            echo "::error::PURE libs must remain native-test compatible. Move ESP-specific code to a different lib."
            exit 1
          fi
          echo "PURE lib purity OK"

  clang-format:
    name: clang-format (changed files only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need both PR base and head SHAs in history for the diff below.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pinned clang-format
        run: |
          set -euo pipefail
          # Pinned exactly. The PyPI 'clang-format' package is a wrapper that
          # bundles the upstream LLVM clang-format binary. Bumping this version
          # is intentional and PR-reviewable.
          pip install 'clang-format==18.1.8'
          clang-format --version

      - name: Check changed C/C++ files against .clang-format
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # workflow_dispatch fires don't have a pull_request context, so fall
          # back to checking the working tree against origin/main in that case.
          if [ -z "${BASE_SHA:-}" ] || [ -z "${HEAD_SHA:-}" ]; then
            echo "No PR context (workflow_dispatch). Comparing HEAD against origin/main."
            git fetch origin main --depth=1
            BASE_SHA=$(git rev-parse origin/main)
            HEAD_SHA=$(git rev-parse HEAD)
          fi

          changed=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" -- \
            '*.c' '*.cpp' '*.h' '*.hpp')

          if [ -z "$changed" ]; then
            echo "No C/C++ files changed in this PR. Nothing to check."
            exit 0
          fi

          echo "Files to check:"
          echo "$changed" | sed 's/^/  - /'
          echo

          # --Werror turns format diffs into a non-zero exit, --dry-run avoids
          # touching the working tree. xargs preserves whitespace via -d '\n'.
          echo "$changed" | xargs -d '\n' clang-format --dry-run --Werror

  native-tests:
    name: Native unit tests (pio test -e test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Shallow clone is fine; version_gen.py is hardened against missing
        # tags (commit 447e423) and produces a placeholder version string
        # when git history isn't available.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO core
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-test-${{ hashFiles('platformio.ini', 'sdkconfig.lolin_d32_pro', 'sdkconfig.metro_s3', 'dependencies.lock') }}
          restore-keys: |
            pio-${{ runner.os }}-test-
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          set -euo pipefail
          pip install --upgrade platformio
          pio --version

      - name: Run native unit tests
        run: pio test -e test

  build:
    name: Build ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel the other board if one fails — we want to see both results.
      fail-fast: false
      matrix:
        env: [lolin_d32_pro, metro_s3]
    steps:
      - uses: actions/checkout@v4
        with:
          # version_gen.py runs `git describe --tags --abbrev=0` to compute
          # the version string. fetch-depth: 0 ensures all tags are present.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO core
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ matrix.env }}-${{ hashFiles('platformio.ini', 'sdkconfig.lolin_d32_pro', 'sdkconfig.metro_s3', 'dependencies.lock') }}
          restore-keys: |
            pio-${{ runner.os }}-${{ matrix.env }}-
            pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          set -euo pipefail
          pip install --upgrade platformio
          pio --version

      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}
